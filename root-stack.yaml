          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:bem13-lab2-pipeline
      Tags:
        - Key: Project
          Value: bem13-lab2-ecs-cicd

